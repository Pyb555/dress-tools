services:
  - type: web
    name: dress-tools-api
    env: python
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TRYON_ENGINE
        value: fashn
      - key: FASHN_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://dress-tools.vercel.app
